<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Basics</title>

    <!-- Activity 1: Link external CSS file -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Activity 2: Internal CSS to make heading italic and underlined -->
    <style>
      h1 {
        font-style: italic;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1>23/EG/CO/047</h1>

    <!-- Inline CSS from manual sample -->
    <h1 style="color: blue">Styled Heading</h1>

    <!-- External CSS paragraph from manual sample -->
    <p>This paragraph uses external CSS.</p>

    <!-- Activity 3: New div with border, padding and margin -->
    <div class="box">
      This div has a border, padding and margin applied through external CSS.
    </div>
  </body>
</html>
